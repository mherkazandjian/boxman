---
version: '1.0'
project: hybrid_two_vms_cloudinit
provider:
  libvirt:
    uri: qemu:///system
    use_sudo: True
    virt_install_cmd: '/bin/python3 /usr/bin/virt-install'
    virt_clone_cmd: '/bin/python3 /usr/bin/virt-clone'
    virsh_cmd: '/bin/virsh'
    verbose: True

workspace:
  path: ~/workspaces/boxmandev/hybrid_two_vms_cloudinit
  files:
    ansible/site.yml: |
      ---
      - name: Ping all hosts
        hosts: all
        tasks:
          - name: Ping
            ansible.builtin.ping:

    inventory/group_vars/all.yml: |
      ---
      timezone: UTC
      base_packages:
        - vim
        - tmux
        - htop
        - tree

    inventory/host_vars/cluster_1_rocky01.yml: |
      ---
      # rocky01-specific overrides

    inventory/host_vars/cluster_1_ubuntu01.yml: |
      ---
      # ubuntu01-specific overrides

templates:
  rocky9:
    name: rocky-9.7-minimal-base-template-cloudinit
    image:
      uri: https://download.rockylinux.org/pub/rocky/9/images/x86_64/Rocky-9-GenericCloud-Base-9.7-20251123.2.x86_64.qcow2
      checksum: sha256:15d81d3434b298142b2fdd8fb54aef2662684db5c082cc191c3c79762ed6360c
    disk_size: 20G
    os_variant: rocky9
    memory: 2048
    vcpus: 2
    cloudinit_network_config: disabled
    cloudinit_done_marker: /var/log/hello-cloudinit.log
    cloudinit: |
      #cloud-config
      hostname: hello-cloudinit
      manage_etc_hosts: true

      users:
        - name: rocky
          plain_text_passwd: rocky
          lock_passwd: false
          sudo: ALL=(ALL) NOPASSWD:ALL
          shell: /bin/bash
        - name: admin
          plain_text_passwd: {{ env("BOXMAN_ADMIN_PASS", default="boxman") }}
          lock_passwd: false
          sudo: ALL=(ALL) NOPASSWD:ALL
          shell: /bin/bash
          homedir: /admin

      ssh_pwauth: true

      package_update: true
      packages:
        - vim
        - curl
        - qemu-guest-agent
        - openssh-server

      growpart:
        mode: auto
        devices: ['/']

      resize_rootfs: true

      write_files:
        - path: /etc/hello-from-cloudinit
          permissions: "0644"
          content: |
            hello world from cloud-init (Rocky Linux 9)
        - path: /etc/NetworkManager/conf.d/90-dhcp-wait.conf
          permissions: "0644"
          content: |
            [connection]
            ipv4.dhcp-timeout=60
        - path: /etc/sysconfig/qemu-ga
          permissions: "0644"
          content: |
            # Allow boxman to run cloud-init status via guest-exec
            BLOCK_RPCS=

      runcmd:
        - touch /etc/cloud/cloud-init.disabled
        - rm -f /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
        - setenforce 0 || true
        - [ sh, -c, "sed -i 's/^SELINUX=enforcing/SELINUX=disabled/' /etc/selinux/config || true" ]
        - systemctl daemon-reload
        - systemctl restart qemu-guest-agent || true
        - systemctl enable --now qemu-guest-agent
        - systemctl restart NetworkManager || true
        - [ sh, -c, "mkdir -p /admin/.ssh && chmod 700 /admin/.ssh && chown -R admin:admin /admin/.ssh" ]
        - [ sh, -c, "echo ran at $(date -Is) >> /var/log/hello-cloudinit.log" ]

  ubuntu2404:
    name: ubuntu-24.04-minimal-base-template-cloudinit
    image:
      uri: http://cloud-images-archive.ubuntu.com/releases/noble/release-20240423/ubuntu-24.04-server-cloudimg-amd64.img
      checksum: sha256:32a9d30d18803da72f5936cf2b7b9efcb4d0bb63c67933f17e3bdfd1751de3f3
    disk_size: 20G
    os_variant: ubuntu24.04
    memory: 2048
    vcpus: 2
    cloudinit_done_marker: /var/log/hello-cloudinit.log
    cloudinit: |
      #cloud-config
      hostname: hello-cloudinit
      manage_etc_hosts: true

      network:
        version: 2
        ethernets:
          default:
            match:
              name: "en*"
            dhcp4: true
            dhcp6: false

      users:
        - name: ubuntu
          lock_passwd: false
          groups: [sudo]
          sudo: "ALL=(ALL) NOPASSWD:ALL"
          shell: /bin/bash

      chpasswd:
        expire: false
        list: |
          ubuntu:ubuntu

      ssh_pwauth: true
      package_update: true
      packages:
        - qemu-guest-agent
        - openssh-server

      write_files:
        - path: /etc/hello-from-cloudinit
          permissions: "0644"
          content: |
            hello world from cloud-init
        - path: /etc/systemd/system/systemd-networkd-wait-online.service.d/override.conf
          permissions: "0644"
          content: |
            [Service]
            ExecStart=
            ExecStart=/usr/lib/systemd/systemd-networkd-wait-online --any

      runcmd:
        - rm -f /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
        - rm -f /etc/cloud/cloud.cfg.d/subiquity-disable-cloudinit-networking.cfg
        - systemctl daemon-reload
        - systemctl enable --now qemu-guest-agent
        - netplan generate || true
        - netplan apply || true
        - dhclient -v || true
        - [ systemctl, enable, --now, qemu-guest-agent ]
        - [ sh, -c, "id admin >/dev/null 2>&1 || useradd -m -d /admin -s /bin/bash -g admin -G sudo admin" ]
        - [ sh, -c, "echo 'admin ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/admin" ]
        - [ sh, -c, "chmod 0440 /etc/sudoers.d/admin" ]
        - [ sh, -c, "echo 'admin:{{ env("BOXMAN_ADMIN_PASS", default="boxman") }}' | chpasswd" ]
        - [ sh, -c, "mkdir -p /admin/.ssh && chmod 700 /admin/.ssh && chown -R admin:admin /admin /admin/.ssh" ]
        - [ sh, -c, "echo ran at $(date -Is) >> /var/log/hello-cloudinit.log" ]

clusters:
  cluster_1:
    proxy_host: localhost
    admin_user: admin
    admin_pass: {{ env("BOXMAN_ADMIN_PASS", default="boxman") }}
    admin_key_name: id_ed25519_boxman
    ssh_config: ssh_config

    networks:
      nat1:
        mode: nat
        bridge:
          stp: 'on'
          delay: '0'
        mac: '52:54:00:00:00:01'
        ip:
          address: '192.168.10.1'
          netmask: '255.255.255.0'
          dhcp:
            range:
              start: '192.168.10.2'
              end: '192.168.10.254'
        enable: True
        autostart: True
      isolated1:
        mode: route
        bridge:
          stp: 'on'
          delay: '0'
        mac: '52:54:00:00:00:02'
        ip:
          address: '10.0.10.1'
          netmask: '255.255.255.0'
          dhcp:
            range:
              start: '10.0.10.2'
              end: '10.0.10.254'
        enable: True
        autostart: True

    vms:
      rocky01:
        hostname: rocky01
        base_image: rocky-9.7-minimal-base-template-cloudinit
        cpus:
          sockets: 1
          cores: 2
          threads: 1
        memory: 2048
        disks:
          - name: disk01
            driver:
              name: qemu
              type: qcow2
            target: vdb
            size: 2048
        network_adapters:
          - name: adapter_1
            link_state: 'up'
            network_source: 'nat1'
      ubuntu01:
        hostname: ubuntu01
        base_image: ubuntu-24.04-minimal-base-template-cloudinit
        cpus:
          sockets: 1
          cores: 2
          threads: 1
        memory: 2048
        disks:
          - name: disk01
            driver:
              name: qemu
              type: qcow2
            target: vdb
            size: 2048
        network_adapters:
          - name: adapter_1
            link_state: 'up'
            network_source: 'nat1'

tasks:
  ping:
    description: "ping all hosts via ansible"
    command: ansible all {{ flags }} -m ansible.builtin.ping

  cmd:
    description: "run a shell command on all hosts"
    command: ansible all {{ flags }} -m ansible.builtin.shell -a
    extra_args_mode: quoted

  site:
    description: "run the full site playbook"
    command: ansible-playbook {{ flags }} --become {{ env("ANSIBLE_SITE", default="ansible") }}/site.yml {{ tags }} --

  ssh:
    description: "ssh to the gateway host"
    command: ssh -F ${SSH_CONFIG} -t ${GATEWAYHOST}
