---
# tiny-libvirt-ubuntu-24.04-oci
#
# Same single-VM Ubuntu 24.04 box as tiny-libvirt-ubuntu-24.04-cloudinit, but the
# template's base image is pulled from an OCI registry via `oras` instead of over
# http(s). The default `oci://` reference below is a public Docker Hub
# containerDisk (the qcow2 is embedded at /disk/); it is fetched + cached the
# first time `boxman up` builds the template — no publish step required. To use
# your own qcow2 published as an OCI artifact instead, see README.md.
#
# An OCI base image can be wired in two ways:
#   (A) on a template's `image.uri` (used below) — supports full cloud-init.
#   (B) directly as `base_image: oci://…` on a cluster/VM — boxman synthesizes an
#       implicit template that applies the DEFAULT cloud-init (no customization).
version: '1.0'
project: boxman_dev_tiny-ubuntu-24.04-oci
provider:
  libvirt:
    uri: qemu:///system
    use_sudo: True
    virt_install_cmd: '/bin/python3 /usr/bin/virt-install'
    virt_clone_cmd: '/bin/python3 /usr/bin/virt-clone'
    virsh_cmd: '/usr/bin/virsh'
    verbose: True

templates:
  template1:
    name: ubuntu-24.04-oci-base-template-cloudinit
    image:
      # A public KubeVirt-style containerDisk on Docker Hub: the Ubuntu 24.04
      # qcow2 is embedded at /disk/ inside the container image. boxman pulls it
      # via oras, extracts the qcow2, and caches it under ~/.cache/boxman/images
      # on the first `boxman up`. No `boxman image push` is needed for a public
      # image; to publish your own qcow2 as an OCI artifact instead, see README.md.
      uri: oci://docker.io/tedezed/ubuntu-container-disk:24.04
    disk_size: 20G
    os_variant: ubuntu24.04
    memory: 4096
    vcpus: 2
    cloudinit_done_marker: /var/log/hello-cloudinit.log
    cloudinit: |
      #cloud-config
      hostname: hello-cloudinit
      manage_etc_hosts: true

      network:
        version: 2
        ethernets:
          default:
            match:
              name: "en*"
            dhcp4: true
            dhcp6: false

      users:
        - name: ubuntu
          lock_passwd: false
          groups: [sudo]
          sudo: "ALL=(ALL) NOPASSWD:ALL"
          shell: /bin/bash

      chpasswd:
        expire: false
        list: |
          ubuntu:ubuntu

      ssh_pwauth: true
      package_update: true
      packages:
        - qemu-guest-agent
        - openssh-server

      write_files:
        - path: /etc/hello-from-cloudinit
          permissions: "0644"
          content: |
            hello world from cloud-init
        - path: /etc/systemd/system/systemd-networkd-wait-online.service.d/override.conf
          permissions: "0644"
          content: |
            [Service]
            ExecStart=
            ExecStart=/usr/lib/systemd/systemd-networkd-wait-online --any

      runcmd:
        - rm -f /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
        - rm -f /etc/cloud/cloud.cfg.d/subiquity-disable-cloudinit-networking.cfg
        - systemctl daemon-reload
        - systemctl enable --now qemu-guest-agent
        - netplan generate || true
        - netplan apply || true
        - dhclient -v || true
        - [ systemctl, enable, --now, qemu-guest-agent ]
        # create admin user via shell commands
        - [ sh, -c, "id admin >/dev/null 2>&1 || useradd -m -d /admin -s /bin/bash -g admin -G sudo admin" ]
        - [ sh, -c, "echo 'admin ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/admin" ]
        - [ sh, -c, "chmod 0440 /etc/sudoers.d/admin" ]
        - [ sh, -c, "echo 'admin:{{ env("BOXMAN_ADMIN_PASS", default="boxman") }}' | chpasswd" ]
        - [ sh, -c, "mkdir -p /admin/.ssh && chmod 700 /admin/.ssh && chown -R admin:admin /admin /admin/.ssh" ]
        - [ sh, -c, "echo ran at $(date -Is) >> /var/log/hello-cloudinit.log" ]

workspace:
  path: ~/workspaces/boxmandev/tiny-libvirt-ubuntu-24.04-oci

clusters:
  cluster_1:
    base_image: ubuntu-24.04-oci-base-template-cloudinit
    proxy_host: localhost
    admin_user: admin
    admin_pass: {{ env("BOXMAN_ADMIN_PASS", default="boxman") }}
    admin_key_name: id_ed25519_boxman    # generated automatically at provisioning time
    ssh_config: ssh_config               # generated automatically at provisioning time

    networks:
      nat1:
        mode: nat
        bridge:
          stp: 'on'
          delay: '0'
        mac: '52:54:00:00:00:05'
        ip:
          address: '192.168.124.1'
          netmask: '255.255.255.0'
          dhcp:
            range:
              start: '192.168.124.2'
              end: '192.168.124.254'
        enable: True
        autostart: True
      isolated1:
        mode: route
        bridge:
          stp: 'on'
          delay: '0'
        mac: '52:54:00:00:00:06'
        ip:
          address: '10.0.124.1'
          netmask: '255.255.255.0'
          dhcp:
            range:
              start: '10.0.124.2'
              end: '10.0.124.254'
        enable: True
        autostart: True

    vms:
      boxman01:
        hostname: boxman01
        cpus:
          sockets: 1
          cores: 2
          threads: 2
        memory: 2048
        max_vcpus: 16       # max vCPU ceiling for hot-scaling (default: sockets*cores*threads)
        max_memory: 16384   # max memory ceiling in MB for hot-scaling (default: same as memory)
        disks:
          - name: disk01
            driver:
              name: qemu
              type: qcow2
            target: vdb
            size: 2048
        network_adapters:
          - name: adapter_1
            link_state: 'up'
            network_source: 'nat1'
          - name: adapter_2
            link_state: 'up'
            network_source: 'isolated1'
