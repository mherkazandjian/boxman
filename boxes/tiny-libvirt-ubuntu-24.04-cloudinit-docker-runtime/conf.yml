---
# Docker-runtime variant of boxes/tiny-libvirt-ubuntu-24.04-cloudinit.
# Differences from the local-runtime version:
#   - `project` has a `-docker-runtime` suffix so it does not collide with
#     a project of the same name already registered under the local runtime
#     in the boxman cache (~/.config/boxman/cache/projects.json).
#   - `provider.libvirt.use_sudo: False` — inside the boxman docker
#     container we execute as root via `docker exec --user root`, so the
#     libvirt commands do not need a `sudo` prefix. The containerised
#     libvirtd is also configured with unix_sock_rw_perms=0777 +
#     auth_unix_rw=none, accepting unauthenticated local connections.
#   - `workspace.path` and the template `workdir` are named with a
#     `-docker-runtime` suffix so artifacts written by the docker runtime
#     (ansible.cfg, ssh_config, inventory, template qcow2, …) live in a
#     separate tree from any local-runtime run of the same box.
#
# Run with:
#   boxman --runtime=docker --conf boxes/tiny-libvirt-ubuntu-24.04-cloudinit-docker-runtime/conf.yml up
version: '1.0'
project: boxman_dev_tiny-ubuntu-24.04-docker-runtime
provider:
  libvirt:
    uri: qemu:///system
    use_sudo: False
    virt_install_cmd: '/bin/python3 /usr/bin/virt-install'
    virt_clone_cmd: '/bin/python3 /usr/bin/virt-clone'
    virsh_cmd: '/usr/bin/virsh'
    verbose: True

templates:
  template1:
    name: ubuntu-24.04-minimal-base-template-cloudinit
    workdir: ~/boxman-templates-docker-runtime
    image:
      uri: http://cloud-images-archive.ubuntu.com/releases/noble/release-20240423/ubuntu-24.04-server-cloudimg-amd64.img
      checksum: sha256:32a9d30d18803da72f5936cf2b7b9efcb4d0bb63c67933f17e3bdfd1751de3f3
    disk_size: 20G
    os_variant: ubuntu24.04
    memory: 2048
    vcpus: 2
    cloudinit_done_marker: /var/log/hello-cloudinit.log
    cloudinit: |
      #cloud-config
      hostname: hello-cloudinit
      manage_etc_hosts: true

      network:
        version: 2
        ethernets:
          default:
            match:
              name: "en*"
            dhcp4: true
            dhcp6: false

      users:
        - name: ubuntu
          lock_passwd: false
          groups: [sudo]
          sudo: "ALL=(ALL) NOPASSWD:ALL"
          shell: /bin/bash

      chpasswd:
        expire: false
        list: |
          ubuntu:ubuntu

      ssh_pwauth: true
      package_update: true
      packages:
        - qemu-guest-agent
        - openssh-server

      write_files:
        - path: /etc/hello-from-cloudinit
          permissions: "0644"
          content: |
            hello world from cloud-init
        - path: /etc/systemd/system/systemd-networkd-wait-online.service.d/override.conf
          permissions: "0644"
          content: |
            [Service]
            ExecStart=
            ExecStart=/usr/lib/systemd/systemd-networkd-wait-online --any

      runcmd:
        - rm -f /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
        - rm -f /etc/cloud/cloud.cfg.d/subiquity-disable-cloudinit-networking.cfg
        - systemctl daemon-reload
        - systemctl enable --now qemu-guest-agent
        - netplan generate || true
        - netplan apply || true
        - dhclient -v || true
        - [ systemctl, enable, --now, qemu-guest-agent ]
        # create admin user via shell commands
        - [ sh, -c, "id admin >/dev/null 2>&1 || useradd -m -d /admin -s /bin/bash -g admin -G sudo admin" ]
        - [ sh, -c, "echo 'admin ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/admin" ]
        - [ sh, -c, "chmod 0440 /etc/sudoers.d/admin" ]
        - [ sh, -c, "echo 'admin:{{ env("BOXMAN_ADMIN_PASS", default="boxman") }}' | chpasswd" ]
        - [ sh, -c, "mkdir -p /admin/.ssh && chmod 700 /admin/.ssh && chown -R admin:admin /admin /admin/.ssh" ]
        - [ sh, -c, "echo ran at $(date -Is) >> /var/log/hello-cloudinit.log" ]

workspace:
  path: ~/workspaces/boxmandev/tiny-libvirt-ubuntu-24.04-cloudinit-docker-runtime

clusters:
  cluster_1:
    base_image: ubuntu-24.04-minimal-base-template-cloudinit
    proxy_host: localhost
    admin_user: admin
    admin_pass: {{ env("BOXMAN_ADMIN_PASS", default="boxman") }}
    admin_key_name: id_ed25519_boxman    # generated automatically at provisioning time
    ssh_config: ssh_config               # generated automatically at provisioning time

    networks:
      nat1:
        mode: nat
        bridge:
          stp: 'on'
          delay: '0'
        mac: '52:54:00:00:00:01'
        ip:
          address: '192.168.11.1'
          netmask: '255.255.255.0'
          dhcp:
            range:
              start: '192.168.11.2'
              end: '192.168.11.254'
        enable: True
        autostart: True
      isolated1:
        mode: route
        bridge:
          stp: 'on'
          delay: '0'
        mac: '52:54:00:00:00:02'
        ip:
          address: '10.0.11.1'
          netmask: '255.255.255.0'
          dhcp:
            range:
              start: '10.0.11.2'
              end: '10.0.11.254'
        enable: True
        autostart: True

    vms:
      boxman01:
        hostname: boxman01
        cpus:
          sockets: 1
          cores: 2
          threads: 2
        memory: 2048
        max_vcpus: 16       # max vCPU ceiling for hot-scaling (default: sockets*cores*threads)
        max_memory: 16384   # max memory ceiling in MB for hot-scaling (default: same as memory)
        disks:
          - name: disk01
            driver:
              name: qemu
              type: qcow2
            target: vdb
            size: 2048
        network_adapters:
          - name: adapter_1
            link_state: 'up'
            network_source: 'nat1'
          - name: adapter_2
            link_state: 'up'
            network_source: 'isolated1'
