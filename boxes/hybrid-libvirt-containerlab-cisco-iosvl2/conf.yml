---
# Hybrid libvirt + containerlab topology with a Cisco IOSvL2 switch.
#
# Same shape as the Arista cEOS example (host01 Ubuntu VM + one
# switch on the shared bridge `clab_mgmt`), but the switch is a Cisco
# IOSvL2 Catalyst-style L2 device running via vrnetlab.
#
# The only real differences vs. the cEOS variant are:
#   - `kind: cisco_vios_l2`  (containerlab kind)
#   - `image: vrnetlab/cisco_vios_l2:15.2.2020T`  (vrnetlab-built container)
#   - Interface name: `GigabitEthernet0/1` instead of `Ethernet1`
#   - startup-config uses classic Cisco IOS CLI (Catalyst-style)
#
# Prereqs:
#   - libvirt + qemu-kvm
#   - Docker
#   - containerlab (bash -c "$(curl -sL https://get.containerlab.dev)")
#   - Cisco IOSvL2 image built as a vrnetlab container. This is the
#     workflow:
#
#       git clone https://github.com/srl-labs/vrnetlab.git
#       cp <your>/vios_l2-adventerprisek9-m.vmdk.SPA.<ver>.qcow2 \
#          vrnetlab/cisco/vios_l2/
#       cd vrnetlab/cisco/vios_l2
#       make                                   # builds vrnetlab/cisco_vios_l2:<ver>
#       docker images | grep cisco_vios_l2
#
#     You must supply the qcow2 yourself — it's a Cisco-licensed image
#     (CCO / EA / VIRL subscription). Vendor-image licensing is
#     independent of boxman and containerlab.
#
# Usage:
#   cd boxes/hybrid-libvirt-containerlab-cisco-iosvl2
#   boxman up                     # brings up VM + shared bridge + IOSvL2 lab
#   boxman netlab inspect
#   $(boxman netlab ssh sw1)      # drops into IOS:   sw1#
#   boxman ssh host01
#   boxman destroy

version: '1.0'
project: hybrid_libvirt_containerlab_cisco_iosvl2

provider:
  libvirt:
    uri: qemu:///system
    use_sudo: True
    virt_install_cmd: '/bin/python3 /usr/bin/virt-install'
    virt_clone_cmd: '/bin/python3 /usr/bin/virt-clone'
    virsh_cmd: '/usr/bin/virsh'
    verbose: True

templates:
  template1:
    name: ubuntu-24.04-minimal-base-template-cloudinit
    image:
      uri: http://cloud-images-archive.ubuntu.com/releases/noble/release-20240423/ubuntu-24.04-server-cloudimg-amd64.img
      checksum: sha256:32a9d30d18803da72f5936cf2b7b9efcb4d0bb63c67933f17e3bdfd1751de3f3
    disk_size: 20G
    os_variant: ubuntu24.04
    memory: 2048
    vcpus: 2
    cloudinit_done_marker: /var/log/hello-cloudinit.log
    cloudinit: |
      #cloud-config
      hostname: hello-cloudinit
      manage_etc_hosts: true

      network:
        version: 2
        ethernets:
          default:
            match:
              name: "en*"
            dhcp4: true
            dhcp6: false

      users:
        - name: ubuntu
          lock_passwd: false
          groups: [sudo]
          sudo: "ALL=(ALL) NOPASSWD:ALL"
          shell: /bin/bash

      chpasswd:
        expire: false
        list: |
          ubuntu:ubuntu

      ssh_pwauth: true
      package_update: true
      packages:
        - qemu-guest-agent
        - openssh-server
        - lldpd
        - iputils-ping
        - tcpdump
        - vlan

      runcmd:
        - rm -f /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
        - rm -f /etc/cloud/cloud.cfg.d/subiquity-disable-cloudinit-networking.cfg
        - systemctl daemon-reload
        - systemctl enable --now qemu-guest-agent
        - systemctl enable --now lldpd
        - netplan generate || true
        - netplan apply || true
        - dhclient -v || true
        - [ sh, -c, "id admin >/dev/null 2>&1 || useradd -m -d /admin -s /bin/bash -G sudo admin" ]
        - [ sh, -c, "echo 'admin ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/admin && chmod 0440 /etc/sudoers.d/admin" ]
        - [ sh, -c, "echo 'admin:{{ env("BOXMAN_ADMIN_PASS", default="boxman") }}' | chpasswd" ]
        - [ sh, -c, "echo ran at $(date -Is) >> /var/log/hello-cloudinit.log" ]

workspace:
  path: ~/workspaces/boxmandev/hybrid-libvirt-containerlab-cisco-iosvl2

# ─── shared bridges (host-level L2 glue between libvirt VMs and the lab) ──
shared_networks:
  clab_mgmt:
    bridge: clab_mgmt
    stp: false
    disable_netfilter: true

clusters:
  cluster_1:
    base_image: ubuntu-24.04-minimal-base-template-cloudinit
    proxy_host: localhost
    admin_user: admin
    admin_pass: {{ env("BOXMAN_ADMIN_PASS", default="boxman") }}
    admin_key_name: id_ed25519_boxman
    ssh_config: ssh_config

    networks:
      nat1:
        mode: nat
        bridge:
          stp: 'on'
          delay: '0'
        mac: '52:54:00:00:00:01'
        ip:
          address: '192.168.10.1'
          netmask: '255.255.255.0'
          dhcp:
            range:
              start: '192.168.10.2'
              end: '192.168.10.254'
        enable: True
        autostart: True

    vms:
      host01:
        hostname: host01
        cpus: { sockets: 1, cores: 2, threads: 2 }
        memory: 2048
        disks:
          - name: disk01
            driver: { name: qemu, type: qcow2 }
            target: vdb
            size: 2048
        network_adapters:
          - name: adapter_1
            link_state: 'up'
            network_source: 'nat1'           # mgmt / internet
          - name: adapter_2
            link_state: 'up'
            network_source: 'clab_mgmt'      # shared bridge -> same L2 as sw1

# ─── containerlab topology (network gear) ─────────────────────────────────
containerlab:
  enabled: true
  lab_name: ciscolab
  topology:
    nodes:
      sw1:
        kind: cisco_vios_l2
        image: vrnetlab/cisco_vios_l2:15.2.2020T
        startup-config: configs/sw1.cfg.j2
    links:
      # IOSvL2's first data port is GigabitEthernet0/1. containerlab
      # normalises this to a plain ethN name on the container side; the
      # host endpoint is just the shared bridge.
      - endpoints: ["sw1:Gi0/1", "host:clab_mgmt"]
