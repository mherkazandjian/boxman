---
# Two fully-isolated boxman clusters wired together by an FRR router that
# runs as a containerlab node.
#
# Topology:
#
#   cluster_1 (mgmt 192.168.10.0/24, libvirt NAT)
#     app1  -- adapter_1 dhcp -- mgmt NAT (internet/admin)
#           -- adapter_2 static 10.10.1.10/24 -- shared bridge bx_inter_a
#                                                       │
#                                                       │ (host:bx_inter_a)
#                                                       ▼
#                                              ┌────────────────┐
#                                              │  FRR router    │
#                                              │  eth1 10.10.1.1│
#                                              │  eth2 10.10.2.1│
#                                              │  ip_forward=1  │
#                                              └────────────────┘
#                                                       ▲
#                                                       │ (host:bx_inter_b)
#                                                       │
#     app2  -- adapter_2 static 10.10.2.10/24 -- shared bridge bx_inter_b
#           -- adapter_1 dhcp -- mgmt NAT (internet/admin)
#   cluster_2 (mgmt 192.168.20.0/24, libvirt NAT)
#
# The two libvirt NATs are completely isolated (different libvirt networks
# with different bridges and IP ranges, namespaced as
# `bprj__...__clstr__cluster_1__clstr__mgmt` etc.). The only L3 path
# between app1 and app2 runs through the FRR router. Verify this:
#
#   $ boxman ssh cluster_1_app1
#   app1$ ping 192.168.20.<app2 mgmt IP>     # fails — NATs are isolated
#   app1$ ping 10.10.2.10                    # works via the FRR router
#   app1$ traceroute 10.10.2.10              # one hop at 10.10.1.1
#
# Prereqs:
#   - libvirt + qemu-kvm
#   - Docker + containerlab
#   - Pulls quay.io/frrouting/frr:9.1.0 (no account/license needed).
#
# Usage:
#   cd boxes/multi-cluster-routed-via-frr
#   boxman up
#   boxman netlab inspect            # router state
#   $(boxman netlab ssh router)      # drop into the router netns
#   boxman destroy                   # tears down VMs + lab; shared bridges persist

version: '1.0'
project: multi_cluster_routed_via_frr

provider:
  libvirt:
    uri: qemu:///system
    use_sudo: True
    virt_install_cmd: '/bin/python3 /usr/bin/virt-install'
    virt_clone_cmd: '/bin/python3 /usr/bin/virt-clone'
    virsh_cmd: '/usr/bin/virsh'
    verbose: True

templates:
  template1:
    name: ubuntu-24.04-minimal-base-template-cloudinit
    image:
      uri: http://cloud-images-archive.ubuntu.com/releases/noble/release-20240423/ubuntu-24.04-server-cloudimg-amd64.img
      checksum: sha256:32a9d30d18803da72f5936cf2b7b9efcb4d0bb63c67933f17e3bdfd1751de3f3
    disk_size: 20G
    os_variant: ubuntu24.04
    memory: 2048
    vcpus: 2
    cloudinit_done_marker: /var/log/hello-cloudinit.log
    cloudinit: |
      #cloud-config
      hostname: hello-cloudinit
      manage_etc_hosts: true

      # Per-MAC netplan match. The same template is shared between app1 and
      # app2; each VM picks up only the blocks whose MAC matches one of its
      # NICs.
      network:
        version: 2
        ethernets:
          mgmt-app1:
            match:
              macaddress: "52:54:00:11:01:01"
            dhcp4: true
            dhcp6: false
            optional: true
          mgmt-app2:
            match:
              macaddress: "52:54:00:11:02:01"
            dhcp4: true
            dhcp6: false
            optional: true
          transit-a:
            match:
              macaddress: "52:54:00:11:01:02"
            addresses:
              - 10.10.1.10/24
            routes:
              - to: 10.10.2.0/24
                via: 10.10.1.1
          transit-b:
            match:
              macaddress: "52:54:00:11:02:02"
            addresses:
              - 10.10.2.10/24
            routes:
              - to: 10.10.1.0/24
                via: 10.10.2.1

      users:
        - name: ubuntu
          lock_passwd: false
          groups: [sudo]
          sudo: "ALL=(ALL) NOPASSWD:ALL"
          shell: /bin/bash

      chpasswd:
        expire: false
        list: |
          ubuntu:ubuntu

      ssh_pwauth: true
      package_update: true
      packages:
        - qemu-guest-agent
        - openssh-server
        - iputils-ping
        - traceroute
        - tcpdump

      runcmd:
        - rm -f /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
        - rm -f /etc/cloud/cloud.cfg.d/subiquity-disable-cloudinit-networking.cfg
        - systemctl daemon-reload
        - systemctl enable --now qemu-guest-agent
        - netplan generate || true
        - netplan apply || true
        - dhclient -v || true
        - [ sh, -c, "id admin >/dev/null 2>&1 || useradd -m -d /admin -s /bin/bash -G sudo admin" ]
        - [ sh, -c, "echo 'admin ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/admin && chmod 0440 /etc/sudoers.d/admin" ]
        - [ sh, -c, "echo 'admin:{{ env('BOXMAN_ADMIN_PASS', default='boxman') }}' | chpasswd" ]
        - [ sh, -c, "echo ran at $(date -Is) >> /var/log/hello-cloudinit.log" ]

workspace:
  path: ~/workspaces/boxmandev/multi-cluster-routed-via-frr

# ─── shared bridges (host-level L2 glue between cluster VMs and the lab) ──
# bx_inter_a is the cluster_1 ↔ router transit segment.
# bx_inter_b is the cluster_2 ↔ router transit segment.
shared_networks:
  bx_inter_a:
    bridge: bx_inter_a
    stp: false
    disable_netfilter: true
  bx_inter_b:
    bridge: bx_inter_b
    stp: false
    disable_netfilter: true

clusters:
  cluster_1:
    base_image: ubuntu-24.04-minimal-base-template-cloudinit
    proxy_host: localhost
    admin_user: admin
    admin_pass: {{ env("BOXMAN_ADMIN_PASS", default="boxman") }}
    admin_key_name: id_ed25519_boxman
    ssh_config: ssh_config

    networks:
      mgmt:
        mode: nat
        bridge:
          stp: 'on'
          delay: '0'
        mac: '52:54:00:00:01:01'
        ip:
          address: '192.168.10.1'
          netmask: '255.255.255.0'
          dhcp:
            range:
              start: '192.168.10.2'
              end: '192.168.10.254'
        enable: True
        autostart: True

    vms:
      app1:
        hostname: app1
        cpus: { sockets: 1, cores: 1, threads: 1 }
        memory: 1024
        network_adapters:
          - name: adapter_1
            link_state: 'up'
            network_source: 'mgmt'
            mac: '52:54:00:11:01:01'
          - name: adapter_2
            link_state: 'up'
            network_source: 'bx_inter_a'
            mac: '52:54:00:11:01:02'

  cluster_2:
    base_image: ubuntu-24.04-minimal-base-template-cloudinit
    proxy_host: localhost
    admin_user: admin
    admin_pass: {{ env("BOXMAN_ADMIN_PASS", default="boxman") }}
    admin_key_name: id_ed25519_boxman
    ssh_config: ssh_config

    networks:
      mgmt:
        mode: nat
        bridge:
          stp: 'on'
          delay: '0'
        mac: '52:54:00:00:02:01'
        ip:
          address: '192.168.20.1'
          netmask: '255.255.255.0'
          dhcp:
            range:
              start: '192.168.20.2'
              end: '192.168.20.254'
        enable: True
        autostart: True

    vms:
      app2:
        hostname: app2
        cpus: { sockets: 1, cores: 1, threads: 1 }
        memory: 1024
        network_adapters:
          - name: adapter_1
            link_state: 'up'
            network_source: 'mgmt'
            mac: '52:54:00:11:02:01'
          - name: adapter_2
            link_state: 'up'
            network_source: 'bx_inter_b'
            mac: '52:54:00:11:02:02'

# ─── containerlab topology (FRR router as managed networking) ─────────────
# The FRR image's default entrypoint reads /etc/frr/frr.conf and starts
# whichever daemons are listed in /etc/frr/daemons (zebra is the only one
# we need for plain IPv4 L3 forwarding). The interface IPs are applied
# from the kernel side via `exec:` because integrated FRR config does not
# install kernel addresses without a configured interface daemon — the
# `frr.conf` file below describes the same interfaces declaratively for
# documentation/illustration of FRR config syntax.
containerlab:
  enabled: true
  lab_name: netlab
  topology:
    nodes:
      router:
        kind: linux
        image: quay.io/frrouting/frr:9.1.0
        startup-config: configs/router.cfg.j2
        binds:
          - configs/router.cfg:/etc/frr/frr.conf:ro
        exec:
          - sysctl -w net.ipv4.ip_forward=1
          - ip address add 10.10.1.1/24 dev eth1
          - ip address add 10.10.2.1/24 dev eth2
          - ip link set eth1 up
          - ip link set eth2 up
    links:
      - endpoints: ["router:eth1", "host:bx_inter_a"]
      - endpoints: ["router:eth2", "host:bx_inter_b"]
