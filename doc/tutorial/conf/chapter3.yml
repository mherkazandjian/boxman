---
version: '1.0'
project: boxman_tutorial

provider:
  libvirt:
    uri: qemu:///system
    use_sudo: True
    virt_install_cmd: '/bin/python3 /usr/bin/virt-install'
    virt_clone_cmd: '/bin/python3 /usr/bin/virt-clone'
    virsh_cmd: '/usr/bin/virsh'
    verbose: True

templates:
  ubuntu_base:
    name: ubuntu-24.04-tutorial-base
    image:
      uri: http://cloud-images-archive.ubuntu.com/releases/noble/release-20240423/ubuntu-24.04-server-cloudimg-amd64.img
      checksum: sha256:32a9d30d18803da72f5936cf2b7b9efcb4d0bb63c67933f17e3bdfd1751de3f3
    disk_size: 20G
    os_variant: ubuntu24.04
    memory: 2048
    vcpus: 2
    cloudinit_done_marker: /var/log/cloudinit-done.log
    cloudinit: |
      #cloud-config
      hostname: tutorial-template
      manage_etc_hosts: true

      network:
        version: 2
        ethernets:
          default:
            match:
              name: "en*"
            dhcp4: true
            dhcp6: false

      users:
        - name: ubuntu
          lock_passwd: false
          groups: [sudo]
          sudo: "ALL=(ALL) NOPASSWD:ALL"
          shell: /bin/bash

      chpasswd:
        expire: false
        list: |
          ubuntu:ubuntu

      ssh_pwauth: true
      package_update: true
      packages:
        - qemu-guest-agent
        - openssh-server

      write_files:
        - path: /etc/systemd/system/systemd-networkd-wait-online.service.d/override.conf
          permissions: "0644"
          content: |
            [Service]
            ExecStart=
            ExecStart=/usr/lib/systemd/systemd-networkd-wait-online --any

      runcmd:
        - rm -f /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
        - rm -f /etc/cloud/cloud.cfg.d/subiquity-disable-cloudinit-networking.cfg
        - systemctl daemon-reload
        - systemctl enable --now qemu-guest-agent
        - netplan generate || true
        - netplan apply || true
        - dhclient -v || true
        - [ sh, -c, "id admin >/dev/null 2>&1 || useradd -m -d /admin -s /bin/bash -g admin -G sudo admin" ]
        - [ sh, -c, "echo 'admin ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/admin" ]
        - [ sh, -c, "chmod 0440 /etc/sudoers.d/admin" ]
        - [ sh, -c, "echo 'admin:{{ env(\"BOXMAN_ADMIN_PASS\", default=\"boxman\") }}' | chpasswd" ]
        - [ sh, -c, "mkdir -p /admin/.ssh && chmod 700 /admin/.ssh && chown -R admin:admin /admin /admin/.ssh" ]
        - [ sh, -c, "echo ran at $(date -Is) >> /var/log/cloudinit-done.log" ]

workspace:
  path: ~/workspaces/boxman-tutorial

  files:
    ansible/bootstrap.yml: |
      ---
      - name: Bootstrap all nodes
        hosts: all
        become: true
        gather_facts: true
        tasks:
          - name: Update apt cache
            ansible.builtin.apt:
              update_cache: true
              cache_valid_time: 3600
            when: ansible_os_family == "Debian"

          - name: Install base packages
            ansible.builtin.package:
              name: "{{ item }}"
              state: present
            loop:
              - vim
              - tmux
              - htop
              - tree
              - curl
              - cmatrix

    ansible/cmatrix-start.yml: |
      ---
      - name: Start cmatrix in a tmux session on all nodes
        hosts: all
        become: true
        tasks:
          - name: Kill any existing cmatrix tmux session
            ansible.builtin.shell: tmux kill-session -t matrix 2>/dev/null || true

          - name: Start cmatrix in a new tmux session
            ansible.builtin.shell: tmux new-session -d -s matrix 'cmatrix -b -u 4'

    ansible/cmatrix-stop.yml: |
      ---
      - name: Stop cmatrix on all nodes
        hosts: all
        become: true
        tasks:
          - name: Kill cmatrix tmux session
            ansible.builtin.shell: tmux kill-session -t matrix 2>/dev/null || true

tasks:
  ping:
    description: "ping all hosts via ansible"
    command: ansible all {{ flags }} -m ansible.builtin.ping

  cmd:
    description: "run a shell command on all hosts"
    command: ansible all {{ flags }} -m ansible.builtin.shell -a

  bootstrap:
    description: "install base packages and cmatrix on all nodes"
    command: ansible-playbook {{ flags }} --become ansible/bootstrap.yml

  cmatrix-start:
    description: "start cmatrix in tmux on all nodes"
    command: ansible-playbook {{ flags }} --become ansible/cmatrix-start.yml

  cmatrix-stop:
    description: "stop cmatrix on all nodes"
    command: ansible-playbook {{ flags }} --become ansible/cmatrix-stop.yml

clusters:
  cluster_1:
    base_image: ubuntu-24.04-tutorial-base
    proxy_host: localhost
    admin_user: admin
    admin_pass: {{ env("BOXMAN_ADMIN_PASS", default="boxman") }}
    admin_key_name: id_ed25519_boxman
    ssh_config: ssh_config

    networks:
      nat1:
        mode: nat
        bridge:
          stp: 'on'
          delay: '0'
        mac: '52:54:00:00:00:01'
        ip:
          address: '192.168.10.1'
          netmask: '255.255.255.0'
          dhcp:
            range:
              start: '192.168.10.2'
              end: '192.168.10.254'
        enable: True
        autostart: True

    vms:
      node01:
        hostname: node01
        cpus:
          sockets: 1
          cores: 4
          threads: 2
        memory: 4096
        max_vcpus: 16
        max_memory: 16384
        disks:
          - name: disk01
            driver:
              name: qemu
              type: qcow2
            target: vdb
            size: 2048
          - name: disk02
            driver:
              name: qemu
              type: qcow2
            target: vdc
            size: 4096
        network_adapters:
          - name: adapter_1
            link_state: 'up'
            network_source: 'nat1'

      node02:
        hostname: node02
        cpus:
          sockets: 1
          cores: 2
          threads: 2
        memory: 2048
        max_vcpus: 16
        max_memory: 16384
        disks:
          - name: disk01
            driver:
              name: qemu
              type: qcow2
            target: vdb
            size: 2048
        network_adapters:
          - name: adapter_1
            link_state: 'up'
            network_source: 'nat1'
